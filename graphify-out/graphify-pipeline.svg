  <line x1="750" y1="240" x2="760" y2="240" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="760" y="200" width="120" height="80" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="778" cy="218" r="11" fill="#ea580c"/>
