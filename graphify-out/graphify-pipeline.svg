  <text x="595" y="459" text-anchor="middle" fill="#6b7280" font-size="10">graph report</text>
  <rect x="720" y="405" width="200" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="820" y="427" text-anchor="middle" fill="#d97706" font-size="12" font-weight="600">wiki/index.md</text>
  <text x="820" y="445" text-anchor="middle" fill="#6b7280" font-size="10">Obsidian-compatible</text>
  <text x="820" y="459" text-anchor="middle" fill="#6b7280" font-size="10">wiki index</text>
  <rect x="945" y="405" width="200" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1045" y="427" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="600">graph.html</text>
  <text x="1045" y="445" text-anchor="middle" fill="#6b7280" font-size="10">Interactive</text>
  <text x="1045" y="459" text-anchor="middle" fill="#6b7280" font-size="10">visualization</text>
  <line x1="1080" y1="280" x2="1080" y2="367" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <!-- Command Reference -->
  <rect x="40" y="540" width="1120" height="80" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="564" fill="#111827" font-size="13" font-weight="600">Quick Commands</text>
  <text x="70" y="588" fill="#2563eb" font-size="12" font-weight="600" font-family="monospace">/graphify .</text>
  <text x="70" y="605" fill="#6b7280" font-size="10">Build graph</text>
  <text x="345" y="588" fill="#16a34a" font-size="12" font-weight="600" font-family="monospace">/graphify update .</text>
  <text x="345" y="605" fill="#6b7280" font-size="10">Incremental update (zero token)</text>
  <text x="620" y="588" fill="#9333ea" font-size="12" font-weight="600" font-family="monospace">/graphify query "..."</text>
  <text x="620" y="605" fill="#6b7280" font-size="10">Semantic BFS query</text>
  <text x="895" y="588" fill="#ea580c" font-size="12" font-weight="600" font-family="monospace">/graphify path A B</text>
  <text x="895" y="605" fill="#6b7280" font-size="10">Shortest path between nodes</text>
  <!-- Key Stats -->
  <rect x="980" y="80" width="180" height="90" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="1070" y="103" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">KEY METRICS</text>
  <text x="1070" y="125" text-anchor="middle" fill="#111827" font-size="20" font-weight="700">71.5x</text>
  <text x="1070" y="142" text-anchor="middle" fill="#6b7280" font-size="10">Token reduction</text>
  <text x="1070" y="162" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="600">Zero LLM cost (code-only)</text>
  <text x="600" y="640" text-anchor="middle" fill="#9ca3af" font-size="10">Graphify v0.8.27 | MIT License | github.com/safishamsi/graphify | graphify.net</text>
</svg>