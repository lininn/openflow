  <text x="370" y="459" text-anchor="middle" fill="#6b7280" font-size="10">core data</text>
  <rect x="495" y="405" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
