  <rect width="1200" height="980" fill="#ffffff"/>
  <text x="600" y="36" text-anchor="middle" class="title">OpenFlow 项目流程图</text>
  <text x="600" y="58" text-anchor="middle" class="subtitle">OpenSpec + Superpowers 工作流编排器 · project context + status-first routing</text>
  <rect x="44" y="130" width="250" height="220" rx="12" fill="#fefce8" stroke="#fde68a" stroke-width="1.2" stroke-dasharray="7,5"/>
  <text x="169" y="154" text-anchor="middle" fill="#854d0e" class="side-title">状态路由规则</text>
  <text x="64" y="182" fill="#92400e" font-size="11">1. 先读 workflow-status.md</text>
  <text x="64" y="206" fill="#92400e" font-size="11">2. 缺失时按文件推断状态</text>
  <text x="64" y="230" fill="#92400e" font-size="11">3. 状态冲突 → 显示 Warning</text>
  <text x="64" y="254" fill="#92400e" font-size="11">4. 无项目上下文 → Init</text>
  <text x="64" y="278" fill="#92400e" font-size="11">5. 根据 gate 推荐下一阶段</text>
  <line x1="64" y1="305" x2="274" y2="305" stroke="#fde68a" stroke-width="1"/>
  <text x="64" y="326" fill="#92400e" font-size="10">grill-me 可选：不作为自动门禁</text>
  <text x="64" y="342" fill="#92400e" font-size="10">Build/Close 发现需求变更 → Amend</text>
