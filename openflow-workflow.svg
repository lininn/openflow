<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 830" width="960" height="830">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="830" fill="#ffffff"/>
  <text x="480" y="32" text-anchor="middle" fill="#111827" font-size="20" font-weight="600">OpenFlow 项目流程图</text>
  <text x="480" y="52" text-anchor="middle" fill="#6b7280" font-size="12">OpenSpec + Superpowers 工作流编排器 (v0.3.x)</text>
  <circle cx="480" cy="88" r="18" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="480" y="93" text-anchor="middle" fill="#2563eb" font-size="14" font-weight="600">U</text>
  <text x="480" y="120" text-anchor="middle" fill="#6b7280" font-size="11">用户</text>
  <line x1="480" y1="125" x2="480" y2="145" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="390" y="148" width="180" height="36" rx="8" ry="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="171" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="600">/openflow</text>
  <line x1="480" y1="184" x2="480" y2="210" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <polygon points="480,215 560,250 480,285 400,250" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="247" text-anchor="middle" fill="#92400e" font-size="12" font-weight="600">状态路由</text>
  <text x="480" y="261" text-anchor="middle" fill="#92400e" font-size="10">State Detection</text>
  <rect x="20" y="218" width="175" height="168" rx="6" ry="6" fill="#fefce8" stroke="#fde68a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="107" y="236" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="600">自动路由规则</text>
  <text x="30" y="254" fill="#92400e" font-size="10">1. 无活跃变更 → Proposal</text>
  <text x="30" y="270" fill="#92400e" font-size="10">2. 有提案无计划 → Spec</text>
  <text x="30" y="286" fill="#92400e" font-size="10">3. 有计划未实现 → Build</text>
  <text x="30" y="302" fill="#92400e" font-size="10">4. 实现进行中 → Build (续)</text>
  <text x="30" y="318" fill="#92400e" font-size="10">5. 全部完成 → Close</text>
  <line x1="30" y1="328" x2="180" y2="328" stroke="#fde68a" stroke-width="0.5"/>
  <text x="30" y="344" fill="#92400e" font-size="9">Build 中需求变更 → Amend</text>
  <text x="30" y="358" fill="#92400e" font-size="9">Close 前可 Amend 修订</text>
  <text x="30" y="372" fill="#92400e" font-size="9">不带子命令 → 自动检测</text>
  <line x1="195" y1="250" x2="400" y2="250" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="770" y="218" width="170" height="155" rx="6" ry="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="855" y="236" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">CLI 命令</text>
  <rect x="785" y="246" width="140" height="26" rx="4" ry="4" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="855" y="264" text-anchor="middle" fill="#166534" font-size="11" font-weight="500">openflow init</text>
  <rect x="785" y="280" width="140" height="26" rx="4" ry="4" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="855" y="298" text-anchor="middle" fill="#166534" font-size="11" font-weight="500">openflow status</text>
  <rect x="785" y="314" width="140" height="26" rx="4" ry="4" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="855" y="332" text-anchor="middle" fill="#166534" font-size="11" font-weight="500">openflow update</text>
  <text x="855" y="356" text-anchor="middle" fill="#6b7280" font-size="9">init: 本地 / 全局 (-g)</text>
  <text x="855" y="370" text-anchor="middle" fill="#6b7280" font-size="9">status: 依赖 + 活跃变更</text>
  <path d="M 400,250 L 350,250 L 350,340" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 560,250 L 610,250 L 610,340" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="255" y="343" width="190" height="50" rx="8" ry="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="365" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="600">Proposal</text>
  <text x="350" y="382" text-anchor="middle" fill="#6b7280" font-size="10">轻量需求捕获 (3-5问)</text>
  <rect x="515" y="343" width="190" height="50" rx="8" ry="8" fill="#faf5ff" stroke="#ede9fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="365" text-anchor="middle" fill="#6b21a8" font-size="14" font-weight="600">Brainstorming</text>
  <text x="610" y="382" text-anchor="middle" fill="#6b7280" font-size="10">深度设计探索 (多轮)</text>
  <text x="480" y="372" text-anchor="middle" fill="#9333ea" font-size="12" font-weight="600">OR</text>
  <path d="M 350,393 L 350,420 L 480,420 L 480,435" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 610,393 L 610,420 L 480,420" stroke="#2563eb" stroke-width="1.5" fill="none"/>
  <rect x="370" y="438" width="220" height="50" rx="8" ry="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="460" text-anchor="middle" fill="#166534" font-size="14" font-weight="600">Spec</text>
  <text x="480" y="477" text-anchor="middle" fill="#6b7280" font-size="10">OpenSpec 生成 + plan-ready.md 翻译</text>
  <line x1="480" y1="488" x2="480" y2="520" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="370" y="523" width="220" height="50" rx="8" ry="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="545" text-anchor="middle" fill="#9a3412" font-size="14" font-weight="600">Amend</text>
  <text x="480" y="562" text-anchor="middle" fill="#6b7280" font-size="10">需求修订 + 计划更新 (受控)</text>
  <path d="M 370,548 C 310,548 310,463 370,463" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="298" y="508" text-anchor="middle" fill="#9333ea" font-size="10">修订</text>
  <line x1="480" y1="573" x2="480" y2="605" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="370" y="608" width="220" height="50" rx="8" ry="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="630" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="600">Build</text>
  <text x="480" y="647" text-anchor="middle" fill="#6b7280" font-size="10">Superpowers TDD + checkpoint</text>
  <line x1="480" y1="658" x2="480" y2="690" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="370" y="693" width="220" height="50" rx="8" ry="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="715" text-anchor="middle" fill="#166534" font-size="14" font-weight="600">Close</text>
  <text x="480" y="732" text-anchor="middle" fill="#6b7280" font-size="10">验证一致性 + 归档</text>
  <path d="M 590,633 C 650,633 650,548 590,548" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="660" y="593" text-anchor="middle" fill="#ea580c" font-size="10">需求变更</text>
  <rect x="640" y="400" width="155" height="220" rx="6" ry="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="717" y="418" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="600">写入边界 (Write Guard)</text>
  <text x="650" y="438" fill="#991b1b" font-size="10">Proposal: proposal.md</text>
  <text x="650" y="456" fill="#991b1b" font-size="10">Brainstorm: proposal.md</text>
  <text x="650" y="474" fill="#991b1b" font-size="10">Spec: changes/ + plan</text>
  <text x="650" y="492" fill="#991b1b" font-size="10">Amend: spec + plan + impl plans</text>
  <text x="650" y="510" fill="#991b1b" font-size="10">Build: code + test</text>
  <text x="650" y="528" fill="#991b1b" font-size="10">Close: archive + verify + issues</text>
  <line x1="650" y1="538" x2="785" y2="538" stroke="#fecaca" stroke-width="0.5"/>
  <text x="717" y="556" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="500">各阶段严格隔离</text>
  <text x="717" y="572" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="500">禁止跨阶段写入</text>
  <text x="717" y="588" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="500">Amend 仅改文档/计划</text>
  <text x="717" y="604" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="500">Close 仅归档+验证</text>
  <line x1="640" y1="500" x2="590" y2="500" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="20" y="630" width="165" height="140" rx="6" ry="6" fill="#f0fdfa" stroke="#ccfbf1" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="102" y="650" text-anchor="middle" fill="#115e59" font-size="11" font-weight="600">外部依赖</text>
  <rect x="35" y="660" width="135" height="42" rx="4" ry="4" fill="#ffffff" stroke="#5eead4" stroke-width="1"/>
  <text x="102" y="679" text-anchor="middle" fill="#115e59" font-size="11" font-weight="600">OpenSpec</text>
  <text x="102" y="695" text-anchor="middle" fill="#6b7280" font-size="9">规格生成 + 校验 + 归档</text>
  <rect x="35" y="710" width="135" height="42" rx="4" ry="4" fill="#ffffff" stroke="#5eead4" stroke-width="1"/>
  <text x="102" y="729" text-anchor="middle" fill="#115e59" font-size="11" font-weight="600">Superpowers</text>
  <text x="102" y="745" text-anchor="middle" fill="#6b7280" font-size="9">writing-plans + TDD + 验证</text>
  <rect x="770" y="630" width="170" height="140" rx="6" ry="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="855" y="650" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">支持的工具 (4)</text>
  <rect x="785" y="660" width="60" height="26" rx="4" ry="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="815" y="678" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="500">Claude</text>
  <rect x="855" y="660" width="70" height="26" rx="4" ry="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="890" y="678" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="500">Codex</text>
  <rect x="785" y="694" width="60" height="26" rx="4" ry="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="815" y="712" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="500">Cursor</text>
  <rect x="855" y="694" width="70" height="26" rx="4" ry="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="890" y="712" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="500">OpenCode</text>
  <text x="855" y="738" text-anchor="middle" fill="#6b7280" font-size="9">别名: claude/codex/cursor</text>
  <text x="855" y="752" text-anchor="middle" fill="#6b7280" font-size="9">命令树: opencode</text>
  <text x="855" y="766" text-anchor="middle" fill="#6b7280" font-size="9">--tools claude,codex,cursor,opencode</text>
  <g transform="translate(20, 800)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="36" y="4" fill="#6b7280" font-size="10">主流程</text>
    <line x1="100" y1="0" x2="130" y2="0" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="136" y="4" fill="#6b7280" font-size="10">修订回路</text>
    <line x1="220" y1="0" x2="250" y2="0" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="256" y="4" fill="#6b7280" font-size="10">需求变更</text>
    <line x1="340" y1="0" x2="370" y2="0" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="376" y="4" fill="#6b7280" font-size="10">路由/边界</text>
  </g>
</svg>